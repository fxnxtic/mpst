name: Test & Lint

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  test:
    name: 🧪 Lint & Test
    runs-on: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy check
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest
